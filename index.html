<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>被保险人声明书生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css">
<style>
:root { --sdhs-green: #009b63; --sdhs-orange: #ef6d22; --sdhs-blue: #0878bd; --sdhs-blue-dark: #0069a8; --ink: #242b35; --muted: #7b8492; --line: #d9dee7; --page: #f0f3f6; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { min-height: 100vh; padding: 24px 14px 40px; color: var(--ink); background: var(--page); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
button, input, select { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }
.container { width: 100%; max-width: 680px; margin: 0 auto; overflow: hidden; background: #fff; box-shadow: 0 18px 48px rgba(40, 64, 84, 0.12); }
.brand-header { display: flex; align-items: center; justify-content: space-between; min-height: 72px; padding: 10px 24px; border-bottom: 1px solid #edf0f3; background: #fff; }
.brand-logo { display: block; width: 82px; height: 62px; object-fit: contain; }
.brand-context { color: #343a43; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
.hero { position: relative; min-height: 218px; padding: 34px 28px 28px; color: #fff; background-color: var(--sdhs-blue); background-image: url("assets/sdhs-bridge-hero.jpg"); background-position: center right; background-size: cover; }
.hero-copy { position: relative; z-index: 1; max-width: 410px; padding-left: 17px; border-left: 5px solid var(--sdhs-orange); }
h1 { margin-bottom: 5px; font-size: 29px; line-height: 1.24; letter-spacing: 0.01em; }
.hero-english { margin-bottom: 18px; color: rgba(255,255,255,0.92); font-size: 14px; letter-spacing: 0.04em; }
.subtitle { max-width: 350px; color: rgba(255,255,255,0.92); font-size: 14px; line-height: 1.65; }
.form-surface { padding: 24px 28px 10px; }
.card { padding: 0 0 24px; background: #fff; }
.card + .card { padding-top: 4px; border-top: 1px solid #e1e5eb; }
.card-title { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-top: 8px; }
.card-title::after { content: ""; flex: 1; height: 1px; background: #d9dee5; }
.step-badge { flex: 0 0 auto; display: grid; place-items: center; width: 42px; height: 42px; border-radius: 8px; color: #fff; background: var(--sdhs-green); font-size: 16px; font-weight: 750; }
.card-title strong { display: block; margin-bottom: 2px; color: #242a32; font-size: 18px; }
.card-title small { display: block; color: var(--muted); font-size: 12px; font-weight: 400; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 7px; color: #303640; font-size: 14px; font-weight: 620; }
.form-group label .req { margin-left: 4px; color: #e13d3d; }
.form-group input, .form-group select { width: 100%; height: 46px; padding: 0 14px; border: 1px solid #d2d8e1; border-radius: 8px; outline: none; color: #232a33; background: #fff; font-size: 15px; transition: border-color 0.18s, box-shadow 0.18s; }
.form-group select { appearance: auto; color: #303640; }
.form-group input::placeholder { color: #a6aebb; }
.form-group input:focus, .form-group select:focus { border-color: var(--sdhs-blue); box-shadow: 0 0 0 3px rgba(8,120,189,0.10); }
.form-row { display: flex; gap: 14px; }
.form-row .form-group { flex: 1; min-width: 0; }
.vehicle-item { position: relative; margin-bottom: 13px; padding: 15px 14px 14px; border: 1px solid #d6dce4; border-radius: 8px; background: #fff; }
.vehicle-head { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; color: #7b8492; font-size: 13px; }
.vehicle-index { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 28px; padding: 0 8px; border-radius: 6px; color: var(--sdhs-green); background: #e8f6f0; font-weight: 750; }
.vehicle-item .remove-btn { position: absolute; top: 13px; right: 12px; display: inline-flex; align-items: center; gap: 4px; padding: 5px 7px; border: 0; color: #df4545; background: transparent; font-size: 13px; cursor: pointer; }
.vehicle-item .remove-btn i { font-size: 17px; }
.add-btn { width: 100%; height: 46px; border: 1px dashed #b8c1cc; border-radius: 7px; color: var(--sdhs-green); background: #fff; font-size: 14px; font-weight: 650; cursor: pointer; transition: border-color 0.18s, background 0.18s; }
.add-btn:hover { border-color: var(--sdhs-green); background: #f5fbf8; }
.add-btn i, .generate-btn i { margin-right: 5px; font-size: 18px; vertical-align: -2px; }
.tip { margin-top: 7px; color: #929aa6; font-size: 11px; text-align: center; }
.submit-panel { padding: 0 28px 22px; background: #fff; }
.submit-copy { display: none; }
.generate-btn { width: 100%; height: 50px; border: 0; border-radius: 7px; color: #fff; background: var(--sdhs-blue); box-shadow: 0 8px 18px rgba(8,120,189,0.20); font-size: 16px; font-weight: 720; cursor: pointer; transition: background 0.18s, transform 0.18s; }
.generate-btn:hover { background: var(--sdhs-blue-dark); transform: translateY(-1px); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.58; cursor: not-allowed; transform: none; }
.pdf-actions { display: none; margin-top: 13px; padding: 14px; border: 1px solid #cfe5dc; border-radius: 8px; background: #f3faf7; }
.pdf-actions p { margin-bottom: 10px; color: #257456; font-size: 13px; line-height: 1.5; text-align: center; word-break: break-all; }
.pdf-action-btn { width: 100%; height: 44px; border: 0; border-radius: 7px; color: #fff; background: var(--sdhs-green); font-size: 14px; font-weight: 680; cursor: pointer; }
.pdf-action-btn.secondary { margin-top: 8px; border: 1px solid var(--sdhs-blue); color: var(--sdhs-blue); background: #fff; }
.privacy-note { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 0 20px 22px; color: #8b939f; background: #fff; font-size: 11px; text-align: center; }
.privacy-note i { color: #7f8d9c; font-size: 14px; }
.toast { position: fixed; top: max(18px, env(safe-area-inset-top)); left: 50%; z-index: 9999; display: none; width: max-content; max-width: calc(100vw - 32px); padding: 11px 18px; transform: translateX(-50%); border-radius: 8px; color: #fff; background: rgba(0,132,83,0.96); box-shadow: 0 10px 24px rgba(35,55,75,0.20); font-size: 13px; text-align: center; }
.toast.error { background: rgba(190,65,69,0.96); }
.pdf-render-root { width: 680px; min-width: 680px; max-width: 680px; box-sizing: border-box; color: #000; background: #fff; font-family: "Songti SC", STSong, SimSun, serif; font-size: 14px; -webkit-text-size-adjust: none; text-size-adjust: none; }
@media (max-width: 520px) {
  body { padding: 0 0 70px; background: #fff; }
  .container { max-width: none; box-shadow: none; }
  .brand-header { min-height: 56px; padding: 4px 16px; }
  .brand-logo { width: 66px; height: 48px; }
  .brand-context { font-size: 12px; }
  .hero { min-height: 164px; padding: 21px 17px 18px; background-position: 58% center; }
  .hero-copy { max-width: 300px; padding-left: 12px; border-left-width: 4px; }
  h1 { font-size: 23px; }
  .hero-english { margin-bottom: 9px; font-size: 11px; }
  .subtitle { max-width: 268px; font-size: 12px; line-height: 1.5; }
  .form-surface { padding: 15px 16px 3px; }
  .card { padding-bottom: 15px; }
  .card + .card { padding-top: 2px; }
  .card-title { gap: 10px; margin-bottom: 13px; padding-top: 5px; }
  .step-badge { width: 34px; height: 34px; font-size: 14px; }
  .card-title strong { margin-bottom: 0; font-size: 16px; }
  .card-title small { font-size: 11px; }
  .form-group { margin-bottom: 10px; }
  .form-group label { margin-bottom: 5px; font-size: 13px; }
  .form-group input, .form-group select { height: 40px; padding: 0 12px; font-size: 13px; }
  .form-row { gap: 11px; }
  .vehicle-item { margin-bottom: 10px; padding: 11px 11px 10px; }
  .vehicle-head { margin-bottom: 9px; }
  .vehicle-index { min-width: 31px; height: 25px; }
  .vehicle-item .remove-btn { top: 9px; right: 8px; }
  .add-btn { height: 40px; }
  .tip { margin-top: 5px; }
  .submit-panel { position: fixed; right: 0; bottom: 0; left: 0; z-index: 10; width: 100%; max-width: 520px; margin: 0 auto; padding: 8px 16px calc(8px + env(safe-area-inset-bottom)); border-top: 1px solid #e2e7ec; background: #fff; box-shadow: 0 -8px 20px rgba(38,57,73,0.08); }
  .generate-btn { height: 46px; }
  .privacy-note { padding: 0 18px 13px; }
}
@media (max-width: 350px) {
  .brand-context { font-size: 11px; }
  .form-row { display: block; }
}
</style>
</head>
<body>

<div class="container">
  <header class="brand-header">
    <img class="brand-logo" src="assets/sdhs-logo.png" alt="SDHS">
    <span class="brand-context">山高聚行 · 车险分期</span>
  </header>
  <section class="hero">
    <div class="hero-copy">
      <h1>被保险人声明书</h1>
      <p class="hero-english">INSURED DECLARATION</p>
      <p class="subtitle">填写业务信息与车辆资料，快速生成并分享 PDF 声明书。</p>
    </div>
  </section>

  <main class="form-surface">

  <!-- 基本信息 -->
  <section class="card">
    <div class="card-title">
      <span class="step-badge">01</span>
      <div><strong>基本信息</strong><small>用于生成声明书正文与文件名称</small></div>
    </div>
    <div class="form-group">
      <label>借款人（开户人/办理主体）<span class="req">*</span></label>
      <input type="text" id="borrower" placeholder="如：XX物流有限公司">
    </div>
    <div class="form-group">
      <label>被保险人<span class="req">*</span></label>
      <input type="text" id="insured" placeholder="如：XX运输有限公司">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分期期数<span class="req">*</span></label>
        <input type="number" id="periods" value="9" min="1" max="12">
      </div>
      <div class="form-group">
        <label>服务费率（%）<span class="req">*</span></label>
        <input type="number" id="rate" placeholder="如：5.50" step="0.01" min="0">
      </div>
    </div>
  </section>

  <!-- 车辆列表 -->
  <section class="card">
    <div class="card-title">
      <span class="step-badge">02</span>
      <div><strong>车辆信息</strong><small>支持车牌号或车架号，可添加多辆车</small></div>
    </div>
    <div id="vehicleList"></div>
    <button type="button" class="add-btn" onclick="addVehicle()"><i class="ri-add-line" aria-hidden="true"></i>添加一辆车</button>
    <p class="tip">支持车牌号或车架号，至少添加1辆</p>
  </section>
  </main>

  <!-- 生成按钮 -->
  <section class="submit-panel">
    <div class="submit-copy"><strong>生成并确认文件</strong><span>生成后可直接分享、下载或存储到“文件”</span></div>
    <button type="button" class="generate-btn" onclick="generatePDF()"><i class="ri-file-pdf-2-line" aria-hidden="true"></i>生成声明书 PDF</button>
    <div class="pdf-actions" id="pdfActions">
      <p id="generatedFileHint">PDF 已生成，请选择分享或下载。</p>
      <button type="button" class="pdf-action-btn" onclick="shareGeneratedPDF()">分享 / 保存 PDF</button>
      <button type="button" class="pdf-action-btn secondary" onclick="downloadGeneratedPDF()">直接下载 PDF</button>
    </div>
  </section>
  <p class="privacy-note"><i class="ri-shield-check-line" aria-hidden="true"></i>填写内容仅用于在当前设备生成文件</p>
</div>

<div class="toast" id="toast"></div>

<script>
let vehicleCount = 0;
let generatedPdfBlob = null;
let generatedPdfFile = null;
let generatedPdfFileName = '';
let generatedFormSignature = '';

const colorMap = {
  yellow: '黄色',
  blue: '蓝色',
  'gradient-green': '渐变绿色',
  'yellow-green': '黄绿双拼',
  green: '绿色',
  white: '白色',
  black: '黑色'
};

function addVehicle() {
  invalidateGeneratedPDF();
  vehicleCount++;
  const id = vehicleCount;
  const div = document.createElement('div');
  div.className = 'vehicle-item';
  div.id = 'vehicle-' + id;
  div.innerHTML = `
    <button type="button" class="remove-btn" aria-label="删除这辆车" onclick="removeVehicle(${id})"><i class="ri-delete-bin-line" aria-hidden="true"></i>删除</button>
    <div class="vehicle-head"><span class="vehicle-index">#${id}</span><span>车辆资料</span></div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>车牌号 / 车架号<span class="req">*</span></label>
      <input type="text" class="v-plate" placeholder="如：鲁A12345 或 LVSHFFAL2GN123456">
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>车牌颜色<span class="req">*</span></label>
      <select class="v-color" aria-label="车牌颜色">
        <option value="">请选择车牌颜色</option>
        <option value="yellow">黄色</option>
        <option value="blue">蓝色</option>
        <option value="gradient-green">渐变绿色</option>
        <option value="yellow-green">黄绿双拼</option>
        <option value="green">绿色</option>
        <option value="white">白色</option>
        <option value="black">黑色</option>
      </select>
    </div>
  `;
  document.getElementById('vehicleList').appendChild(div);
}

function removeVehicle(id) {
  invalidateGeneratedPDF();
  const el = document.getElementById('vehicle-' + id);
  if (el) el.remove();
  // 重新编号
  const items = document.querySelectorAll('.vehicle-item');
  items.forEach((item, i) => {
    item.querySelector('.vehicle-index').textContent = '#' + (i + 1);
  });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function isIOSDevice() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function invalidateGeneratedPDF() {
  generatedPdfBlob = null;
  generatedPdfFile = null;
  generatedPdfFileName = '';
  generatedFormSignature = '';
  const actions = document.getElementById('pdfActions');
  if (actions) actions.style.display = 'none';
}

function sanitizeFileNamePart(value) {
  const normalized = value.normalize('NFKC').replace(/[\u0000-\u001f\u007f/\\?%*:|"<>]/g, '-');
  return normalized.replace(/\s+/g, ' ').replace(/[.\s]+$/g, '').trim().slice(0, 60) || '未命名被保险人';
}

function getLocalDateString() {
  const now = new Date();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${now.getFullYear()}-${month}-${day}`;
}

function buildPdfFileName(insured) {
  return `被保险人声明书_${sanitizeFileNamePart(insured)}_${getLocalDateString()}.pdf`;
}

function getCurrentFormSignature() {
  const vehicles = Array.from(document.querySelectorAll('.vehicle-item')).map(item => ({
    plate: item.querySelector('.v-plate').value.trim(),
    color: item.querySelector('.v-color').value
  }));
  return JSON.stringify({
    borrower: document.getElementById('borrower').value.trim(),
    insured: document.getElementById('insured').value.trim(),
    periods: document.getElementById('periods').value.trim(),
    rate: document.getElementById('rate').value.trim(),
    vehicles
  });
}

function ensureGeneratedPDFIsCurrent() {
  if (!generatedPdfBlob || !generatedPdfFile) {
    showToast('请先生成 PDF', true);
    return false;
  }
  if (generatedFormSignature !== getCurrentFormSignature()) {
    invalidateGeneratedPDF();
    showToast('信息已修改，请重新生成 PDF', true);
    return false;
  }
  return true;
}

function storeGeneratedPDF(blob, fileName, formSignature) {
  generatedPdfBlob = blob;
  generatedPdfFileName = fileName;
  generatedPdfFile = new File([blob], fileName, { type: 'application/pdf' });
  generatedFormSignature = formSignature;
}

function downloadGeneratedPDF() {
  if (!ensureGeneratedPDFIsCurrent()) return;

  const url = URL.createObjectURL(generatedPdfBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = generatedPdfFileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('✅ PDF 已开始下载');
}

async function shareGeneratedPDF() {
  if (!ensureGeneratedPDFIsCurrent()) return;

  const shareData = { files: [generatedPdfFile] };
  try {
    if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
      await navigator.share(shareData);
      showToast('✅ PDF 已分享');
    } else {
      downloadGeneratedPDF();
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      showToast('分享失败，请使用“直接下载 PDF”', true);
      console.error(err);
    }
  }
}

function generatePDF() {
  invalidateGeneratedPDF();
  const borrower = document.getElementById('borrower').value.trim();
  const insured = document.getElementById('insured').value.trim();
  const periods = document.getElementById('periods').value.trim();
  const rate = document.getElementById('rate').value.trim();

  if (!borrower) { showToast('请填写借款人', true); return; }
  if (!insured) { showToast('请填写被保险人', true); return; }
  if (!periods) { showToast('请填写分期期数', true); return; }
  if (!rate) { showToast('请填写服务费率', true); return; }

  const vehicleItems = document.querySelectorAll('.vehicle-item');
  if (vehicleItems.length === 0) { showToast('请至少添加1辆车辆', true); return; }

  const vehicles = [];
  for (const item of vehicleItems) {
    const plate = item.querySelector('.v-plate').value.trim();
    const colorSelect = item.querySelector('.v-color');
    if (!plate) { showToast('请填写所有车辆的车牌号/车架号', true); return; }
    if (!colorSelect.value) { showToast('请选择所有车辆的车牌颜色', true); return; }
    vehicles.push({
      plate: plate,
      colorKey: colorSelect.value,
      color: colorMap[colorSelect.value]
    });
  }

  const formSignature = JSON.stringify({ borrower, insured, periods, rate, vehicles: vehicles.map(v => ({ plate: v.plate, color: v.colorKey })) });
  const fileName = buildPdfFileName(insured);

  // 使用 jsPDF 生成 PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  // 页面设置
  const pageW = 210;
  const marginLeft = 25;
  const marginRight = 25;
  const contentW = pageW - marginLeft - marginRight;
  let y = 25;
  const lineHeight = 7;
  const fontSize = 12;

  // 设置中文字体 - 使用内置字体，中文需要特殊处理
  // jsPDF 默认不支持中文，我们用 SVG 转 canvas 方式或使用 html2canvas
  // 更好的方案：直接用 html2canvas
  generateFromHTML(borrower, insured, periods, rate, vehicles, fileName, formSignature);
}

function escapeHTML(value) {
  return value.replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
}

function generateFromHTML(borrower, insured, periods, rate, vehicles, fileName, formSignature) {
  const vehicleRows = vehicles.map((v, i) => 
    `<tr><td style="border:1px solid #333;text-align:center;padding:4px 8px;">${i+1}</td><td style="border:1px solid #333;text-align:center;padding:4px 8px;">${escapeHTML(v.plate)}</td><td style="border:1px solid #333;text-align:center;padding:4px 8px;">${escapeHTML(v.color)}</td></tr>`
  ).join('');

  const rateDisplay = rate.includes('%') ? rate : rate + '%';
  const today = `${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日`;
  const safeBorrower = escapeHTML(borrower);
  const safeInsured = escapeHTML(insured);

  // 第一页：正文
  const page1HTML = `
    <div class="pdf-render-root" style="padding:25px 50px 15px;line-height:1.6;">
      <h2 style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:10px;">保单被保险人声明书</h2>
      <p style="margin-bottom:4px;">致：山高聚行（北京）科技有限公司山东分公司</p>
      <p style="text-indent:2em;margin-bottom:4px;">本公司作为车牌号（或车架号）为<u>附件1《车辆列表》内</u>的车辆（下称"该车辆"）之实际权利人，现就该车辆的商业险分期事宜作出如下声明与承诺：</p>
      <p style="text-indent:2em;margin-bottom:4px;">一、本公司作为车辆的实际权利人，同意并认可该车辆以<b>${safeBorrower}</b>名义作为办理主体，在贵司办理该车辆保险分期业务、签订相关合同等文件，即本公司同意该车辆的投保人为<b>山高聚行（北京）科技有限公司山东分公司</b>，被保险人为<b>${safeInsured}</b>，且本公司无条件认可并接受投保人与办理主体之间签订的相关合同等文件之全部内容并愿意承担车辆权利人应承担的合同义务和责任。</p>
      <p style="text-indent:2em;margin-bottom:4px;">二、本公司在此不可撤销地授权贵司作为该车辆的投保人办理商业险购买及相关手续。本公司承诺按照贵司与<b>${safeBorrower}</b>签订的相关合同等文件所约定的分期方式支付保险分期费用。</p>
      <p style="text-indent:2em;margin-bottom:4px;">三、本公司确认已知悉并同意保险分期业务的费率结构（服务费率${escapeHTML(rateDisplay)}、分期周期${escapeHTML(periods)}期），并承诺按照投保人与办理主体签署的分期协议约定，对系统中显示的被保险人为<b>${safeInsured}</b>的全部未清偿的保险分期款项承担连带清偿责任，责任范围包括商业险保费、手续费及其他一切合理追偿费用。</p>
      <p style="text-indent:2em;margin-bottom:4px;">四、本公司在此不可撤销地同意由投保人即<b>山高聚行（北京）科技有限公司山东分公司</b>在合同约定或法律规定的退保条件成就时直接发起退保，投保人发起退保时，出具本声明书的电子版影印件即视为我司已书面同意由投保人发起退保，我司不再主张被保险人在保单退保过程中的所有权益，所有退保权益均由投保人主张。退保车辆名单明细以<b>山高聚行（北京）科技有限公司山东分公司</b>提供为准。本公司已了解退保所带来的后果，并愿意承担本承诺所带来的结果及相关责任。</p>

  `;

  // 第二页：附件
  const page2HTML = `
    <div class="pdf-render-root" style="padding:40px 50px;line-height:2;">
      <p style="font-weight:bold;margin-bottom:20px;">附件1 车辆列表</p>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#f5f5f5;">
            <th style="border:1px solid #333;padding:6px 10px;width:60px;">序号</th>
            <th style="border:1px solid #333;padding:6px 10px;">车牌号/发动机号/车架号</th>
            <th style="border:1px solid #333;padding:6px 10px;width:80px;">车牌颜色</th>
          </tr>
        </thead>
        <tbody>
          ${vehicleRows}
        </tbody>
      </table>
    </div>
  `;

  // 创建两个隐藏容器
  const c1 = document.createElement('div');
  c1.style.cssText = 'position:fixed;left:-9999px;top:0;width:680px;min-width:680px;max-width:680px;-webkit-text-size-adjust:none;text-size-adjust:none;';
  c1.innerHTML = page1HTML;
  document.body.appendChild(c1);

  const c2 = document.createElement('div');
  c2.style.cssText = 'position:fixed;left:-9999px;top:0;width:680px;min-width:680px;max-width:680px;-webkit-text-size-adjust:none;text-size-adjust:none;';
  c2.innerHTML = page2HTML;
  document.body.appendChild(c2);

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  script.onload = function() {
    const opts = { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 680, windowWidth: 1200 };
    Promise.all([html2canvas(c1, opts), html2canvas(c2, opts)]).then(([canvas1, canvas2]) => {
      document.body.removeChild(c1);
      document.body.removeChild(c2);

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pdfW = 210;
      const pageH = 297;

      // 辅助函数：用临时 canvas 裁切每页内容，确保不截断
      function addCanvasPages(pdf, canvas, needNewPage) {
        const scale = canvas.width / pdfW;  // px per mm
        const totalH_mm = canvas.height / scale;
        const totalPages = Math.ceil(totalH_mm / pageH);

        for (let i = 0; i < totalPages; i++) {
          if (i > 0 || needNewPage) pdf.addPage();
          // 本页在源 canvas 中的起始/结束像素
          const srcY = Math.round(i * pageH * scale);
          const srcH = Math.min(Math.round(pageH * scale), canvas.height - srcY);
          // 本页在 PDF 中的高度
          const destH = srcH / scale;

          // 用临时 canvas 精确裁切本页区域
          const tmp = document.createElement('canvas');
          tmp.width = canvas.width;
          tmp.height = srcH;
          const ctx = tmp.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, tmp.width, tmp.height);
          ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

          const imgData = tmp.toDataURL('image/jpeg', 0.95);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, destH);
        }
      }

      // 正文（可能占多页）
      addCanvasPages(pdf, canvas1, false);
      // 附件（新页开始）
      addCanvasPages(pdf, canvas2, true);

      pdf.setProperties({
        title: fileName,
        subject: '保单被保险人声明书',
        creator: '被保险人声明书生成器'
      });
      const blob = pdf.output('blob');
      if (formSignature !== getCurrentFormSignature()) {
        invalidateGeneratedPDF();
        showToast('信息已修改，请重新生成 PDF', true);
        return;
      }
      storeGeneratedPDF(blob, fileName, formSignature);
      document.getElementById('generatedFileHint').textContent = `已生成：${fileName}`;

      if (isIOSDevice()) {
        // iOS 分享临时 blob: 链接时会产生无后缀书签文件；改为由用户分享真正的 File 对象。
        document.getElementById('pdfActions').style.display = 'block';
        showToast('✅ PDF 已生成，请点击“分享 / 保存 PDF”');
      } else {
        pdf.save(fileName);
        showToast('✅ PDF已生成并开始下载');
      }
    }).catch(err => {
      document.body.removeChild(c1);
      document.body.removeChild(c2);
      showToast('生成失败：' + err.message, true);
      console.error(err);
    });
  };
  document.head.appendChild(script);
}

// 初始添加一辆车
addVehicle();
document.querySelector('.container').addEventListener('input', invalidateGeneratedPDF);
document.querySelector('.container').addEventListener('change', invalidateGeneratedPDF);
</script>
